                    title:
                      maxLength: 255
                      minLength: 1
                      type: string
                mobile_push:
                  type: object
                  properties:
                    action_url:
                      maxLength: 2048
                      type: string
                      nullable: true
                    content:
                      maxLength: 1048576
                      type: string
                    title:
                      maxLength: 255
                      minLength: 1
                      type: string
                slack:
                  type: object
                  properties:
                    action_url:
                      maxLength: 2048
                      type: string
                      nullable: true
                    content:
                      maxLength: 1048576
                      type: string
                    title:
                      maxLength: 255
                      minLength: 1
                      type: string
                sms:
                  type: object
                  properties:
                    action_url:
                      maxLength: 2048
                      type: string
                      nullable: true
                    content:
                      maxLength: 1048576
                      type: string
                    title:
                      maxLength: 255
                      minLength: 1
                      type: string
                web_push:
                  type: object
                  properties:
                    action_url:
                      maxLength: 2048
                      type: string
                      nullable: true
                    content:
                      maxLength: 1048576
                      type: string
                    title:
                      maxLength: 255
                      minLength: 1
                      type: string
            providers:
              type: object
              properties:
                amazon_ses:
                  type: object
                android:
                  type: object
                ios:
                  type: object
                mailgun:
                  type: object
                postmark:
                  type: object
                sendgrid:
                  type: object
                slack:
                  type: object
          additionalProperties: false
          nullable: true
        recipients:
          maxItems: 1000
          minItems: 1
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/topic'
            - $ref: '#/components/schemas/user'
        status:
          required:
          - status
          - summary
          - errors
          type: object
          properties:
            errors:
              type: array
              items:
                type: object
                properties:
                  message:
                    type: string
              nullable: true
            status:
              enum:
              - enqueued
              - processing
              - processed
              type: string
              readOnly: true
            summary:
              required:
              - total
              - failures
              type: object
              properties:
                failures:
                  type: integer
                  description: The number of failures while processing the broadcast.
                  readOnly: true
                total:
                  type: integer
                  description: The number of recipients that the broadcast was sent to.
                  readOnly: true
        title:
          maxLength: 255
          minLength: 1
          type: string
        topic:
          maxLength: 255
          pattern: ^[A-Za-z0-9_\.\-/:]+$
          type: string
          nullable: true
