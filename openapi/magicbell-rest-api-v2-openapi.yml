    get:
      tags:
      - project
      description: Retrieves a list of all active project-level JWT tokens. Returns a paginated list showing token metadata
        including creation date, last used date, and expiration time. For security reasons, the actual token values are not
        included in the response.
      operationId: fetch_project_tokens
      parameters:
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
      - name: page[after]
        in: query
        required: false
        schema:
          type: string
      - name: page[before]
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArrayOfFetchTokensResponseTokens'
    post:
      tags:
      - project
      description: Creates a new project-level JWT token. These tokens provide project-wide access and should be carefully
        managed. Only administrators can create project tokens. The returned token should be securely stored as it cannot
        be retrieved again after creation.
      operationId: create_project_jwt
      requestBody:
