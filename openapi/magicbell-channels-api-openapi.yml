components:
  schemas:
    CategoryDeliveryConfig:
      required:
      - channels
      - key
      type: object
      properties:
        channels:
          type: array
          items:
            required:
            - channel
            type: object
            properties:
              channel:
                enum:
                - in_app
                - slack
                - web_push
                - mobile_push
                - teams
                - email
                type: string
              delay:
                minimum: 0
                type: integer
              disabled:
                type: boolean
                default: false
              if:
                type: string
              priority:
                minimum: 0
                type: integer
        disabled:
          type: boolean
          default: false
        key:
          minLength: 3
          pattern: ^[A-Za-z0-9_\.\-:]+$
          type: string
      example:
        channels:
        - channel: in_app
        - channel: email
          if: '{{notification.unseen}} == false'
        disabled: false
        key: project
    SlackToken:
